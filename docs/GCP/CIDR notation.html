
<style>
* { box-sizing: border-box; }
.container { padding: 1.5rem 0; font-family: var(--font-sans); }
.input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.ip-input { font-family: var(--font-mono); font-size: 15px; width: 160px; }
.prefix-wrap { display: flex; align-items: center; gap: 8px; }
.prefix-label { font-size: 16px; font-weight: 500; color: var(--color-text-secondary); }
.prefix-val { font-family: var(--font-mono); font-size: 15px; width: 60px; }
.err { font-size: 12px; color: var(--color-text-danger); min-height: 16px; }
.section-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
.bits-row { display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.bit { width: 16px; height: 28px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; border-radius: 3px; color: var(--color-text-primary); border: 0.5px solid var(--color-border-tertiary); transition: background 0.2s; }
.bit.net { background: #D4E4F7; border-color: #A8C8EF; }
.bit.host { background: #E1F5EE; border-color: #9FE1CB; }
.bit.divider { width: 6px; background: none; border: none; }
.bit-legend { display: flex; gap: 16px; margin-bottom: 1.25rem; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
.swatch-net { background: #D4E4F7; border: 0.5px solid #A8C8EF; }
.swatch-host { background: #E1F5EE; border: 0.5px solid #9FE1CB; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.card-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
.card-val { font-size: 14px; font-weight: 500; font-family: var(--font-mono); color: var(--color-text-primary); }
.card-val.big { font-size: 18px; }
.range-block { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; margin-bottom: 1rem; }
.range-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.range-row:last-child { border-bottom: none; }
.range-key { color: var(--color-text-secondary); }
.range-mono { font-family: var(--font-mono); color: var(--color-text-primary); }
.octet-row { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.octet-group { display: flex; flex-direction: column; align-items: center; }
.octet-bits { display: flex; gap: 2px; }
.octet-dec { font-family: var(--font-mono); font-size: 11px; margin-top: 4px; color: var(--color-text-secondary); }
.octet-dot { display: flex; align-items: center; padding: 0 2px; font-size: 16px; color: var(--color-text-secondary); padding-bottom: 16px; }
.presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.preset-btn { font-size: 11px; padding: 4px 8px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 4px; cursor: pointer; font-family: var(--font-mono); color: var(--color-text-primary); }
.preset-btn:hover { background: var(--color-background-tertiary); }
</style>
<div class="container">
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;">Try a preset or enter your own:</div>
  <div class="presets">
    <button class="preset-btn" onclick="loadPreset('192.168.1.0','24')">192.168.1.0/24</button>
    <button class="preset-btn" onclick="loadPreset('10.0.0.0','8')">10.0.0.0/8</button>
    <button class="preset-btn" onclick="loadPreset('172.16.0.0','16')">172.16.0.0/16</button>
    <button class="preset-btn" onclick="loadPreset('203.0.113.0','28')">203.0.113.0/28</button>
    <button class="preset-btn" onclick="loadPreset('192.168.1.100','30')">192.168.1.100/30</button>
    <button class="preset-btn" onclick="loadPreset('8.8.8.8','32')">8.8.8.8/32</button>
  </div>

  <div class="input-row">
    <input class="ip-input" id="ip-in" type="text" value="192.168.1.0" placeholder="e.g. 192.168.1.0" oninput="update()">
    <div class="prefix-wrap">
      <span class="prefix-label">/</span>
      <input class="prefix-val" id="pfx-in" type="number" min="0" max="32" value="24" oninput="update()">
    </div>
  </div>
  <div class="err" id="err-msg"></div>

  <div class="section-label">Binary breakdown — each octet</div>
  <div class="octet-row" id="octet-row"></div>

  <div class="bit-legend">
    <div class="legend-item"><div class="legend-swatch swatch-net"></div><span>Network bits (fixed)</span></div>
    <div class="legend-item"><div class="legend-swatch swatch-host"></div><span>Host bits (variable)</span></div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="section-label">Address range</div>
  <div class="range-block" id="range-block"></div>
</div>

<script>
function toBinary(n) { return n.toString(2).padStart(8,'0'); }
function ipToNum(ip) {
  const parts = ip.split('.').map(Number);
  return (parts[0]<<24|parts[1]<<16|parts[2]<<8|parts[3])>>>0;
}
function numToIp(n) {
  return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
}
function subnetMask(prefix) {
  return prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix)) >>> 0;
}
function formatLarge(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
  return n.toLocaleString();
}

function loadPreset(ip, pfx) {
  document.getElementById('ip-in').value = ip;
  document.getElementById('pfx-in').value = pfx;
  update();
}

function update() {
  const ipStr = document.getElementById('ip-in').value.trim();
  const prefix = parseInt(document.getElementById('pfx-in').value);
  const err = document.getElementById('err-msg');

  const parts = ipStr.split('.');
  const valid = parts.length === 4 && parts.every(p => /^\d+$/.test(p) && +p>=0 && +p<=255)
    && !isNaN(prefix) && prefix >= 0 && prefix <= 32;

  if (!valid) { err.textContent = 'Enter a valid IPv4 address and prefix (0–32)'; clearUI(); return; }
  err.textContent = '';

  const ip = ipToNum(ipStr);
  const mask = subnetMask(prefix);
  const network = (ip & mask) >>> 0;
  const broadcast = (network | (~mask >>> 0)) >>> 0;
  const hostBits = 32 - prefix;
  const totalAddrs = Math.pow(2, hostBits);
  const usable = hostBits >= 2 ? totalAddrs - 2 : (hostBits === 1 ? 0 : 1);

  // Octet breakdown
  const octets = [(ip>>>24)&255,(ip>>>16)&255,(ip>>>8)&255,ip&255];
  const orEl = document.getElementById('octet-row');
  orEl.innerHTML = '';
  let bitPos = 0;
  octets.forEach((oct, oi) => {
    const grp = document.createElement('div');
    grp.className = 'octet-group';
    const bitsDiv = document.createElement('div');
    bitsDiv.className = 'octet-bits';
    const binStr = toBinary(oct);
    for (let b = 0; b < 8; b++) {
      const span = document.createElement('span');
      span.className = 'bit ' + (bitPos < prefix ? 'net' : 'host');
      span.textContent = binStr[b];
      bitsDiv.appendChild(span);
      bitPos++;
    }
    const dec = document.createElement('div');
    dec.className = 'octet-dec';
    dec.textContent = oct;
    grp.appendChild(bitsDiv);
    grp.appendChild(dec);
    orEl.appendChild(grp);
    if (oi < 3) {
      const dot = document.createElement('div');
      dot.className = 'octet-dot';
      dot.textContent = '.';
      orEl.appendChild(dot);
    }
  });

  // Cards
  const cards = document.getElementById('cards');
  cards.innerHTML = `
    <div class="card"><div class="card-label">Subnet mask</div><div class="card-val">${numToIp(mask)}</div></div>
    <div class="card"><div class="card-label">Network bits</div><div class="card-val big">${prefix}</div></div>
    <div class="card"><div class="card-label">Host bits</div><div class="card-val big">${hostBits}</div></div>
    <div class="card"><div class="card-label">Total addresses</div><div class="card-val big">${formatLarge(totalAddrs)}</div></div>
    <div class="card"><div class="card-label">Usable hosts</div><div class="card-val big">${usable > 0 ? formatLarge(usable) : '0'}</div></div>
  `;

  // Range
  const rb = document.getElementById('range-block');
  const firstHost = hostBits >= 1 ? numToIp(network + 1) : numToIp(network);
  const lastHost  = hostBits >= 1 ? numToIp(broadcast - 1) : numToIp(broadcast);
  rb.innerHTML = `
    <div class="range-row"><span class="range-key">Network address</span><span class="range-mono">${numToIp(network)}</span></div>
    <div class="range-row"><span class="range-key">Subnet mask</span><span class="range-mono">${numToIp(mask)}</span></div>
    ${hostBits >= 2 ? `<div class="range-row"><span class="range-key">First usable host</span><span class="range-mono">${firstHost}</span></div>
    <div class="range-row"><span class="range-key">Last usable host</span><span class="range-mono">${lastHost}</span></div>` : ''}
    <div class="range-row"><span class="range-key">Broadcast address</span><span class="range-mono">${numToIp(broadcast)}</span></div>
  `;
}

function clearUI() {
  ['octet-row','cards','range-block'].forEach(id => document.getElementById(id).innerHTML = '');
}

update();
</script>
