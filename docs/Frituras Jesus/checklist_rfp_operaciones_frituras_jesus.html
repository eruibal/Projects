<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checklist ERP Operaciones — Frituras Jesús</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; color: #1a1a18; padding: 2rem 1rem; }
  .wrap { max-width: 780px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 20px; font-weight: 500; }
  .header p { font-size: 13px; color: #5f5e5a; margin-top: 4px; }
  .progress-bar-bg { background: #d3d1c7; border-radius: 4px; height: 6px; margin-top: 10px; }
  .progress-bar-fill { height: 6px; border-radius: 4px; background: #1D9E75; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: #5f5e5a; margin-top: 4px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 6px 14px; font-size: 13px; border-radius: 8px; border: 0.5px solid #b4b2a9; cursor: pointer; color: #5f5e5a; background: #fff; }
  .tab.active { background: #f1efe8; color: #1a1a18; font-weight: 500; border-color: #888780; }
  .tab:hover { background: #f1efe8; }
  .section { margin-bottom: 1.5rem; }
  .section-title { font-size: 14px; font-weight: 500; color: #1a1a18; margin-bottom: 8px; padding: 6px 10px; background: #f1efe8; border-radius: 8px; border-left: 3px solid; }
  .s-almacen { border-color: #1D9E75; }
  .s-produccion { border-color: #378ADD; }
  .s-logistica { border-color: #D85A30; }
  .s-general { border-color: #7F77DD; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; border: 0.5px solid transparent; margin-bottom: 3px; background: #fff; }
  .item:hover { background: #f1efe8; }
  .item.checked { background: #f1efe8; border-color: #d3d1c7; }
  .item.checked .item-text { color: #888780; }
  .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #888780; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checkbox.done { background: #1D9E75; border-color: #1D9E75; }
  .check-svg { display: none; }
  .checkbox.done .check-svg { display: block; }
  .item-text { font-size: 13px; line-height: 1.5; color: #1a1a18; }
  .item-tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
  .tag-critico { background: #FAECE7; color: #993C1D; }
  .tag-datos { background: #E6F1FB; color: #185FA5; }
  .tag-proceso { background: #EAF3DE; color: #3B6D11; }
  .tag-integracion { background: #EEEDFE; color: #534AB7; }
  .tag-usuario { background: #FAEEDA; color: #854F0B; }
  .meta-row { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
  .note-box { margin-top: 6px; margin-left: 0; }
  .note-input { width: 100%; font-size: 12px; border: 0.5px solid #d3d1c7; border-radius: 8px; padding: 6px 8px; background: #fff; color: #1a1a18; resize: none; min-height: 40px; display: none; font-family: inherit; }
  .note-input.open { display: block; }
  .note-toggle { font-size: 11px; color: #888780; cursor: pointer; margin-top: 3px; display: inline-block; }
  .note-toggle:hover { color: #1a1a18; }
  .summary-box { background: #f1efe8; border-radius: 12px; border: 0.5px solid #d3d1c7; padding: 1rem; margin-top: 1rem; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .summary-card { background: #fff; border-radius: 8px; padding: 10px; text-align: center; border: 0.5px solid #d3d1c7; }
  .summary-card .num { font-size: 22px; font-weight: 500; }
  .summary-card .lbl { font-size: 11px; color: #5f5e5a; margin-top: 2px; }
  .export-btn { font-size: 13px; padding: 7px 16px; border-radius: 8px; border: 0.5px solid #888780; cursor: pointer; background: #fff; color: #1a1a18; }
  .export-btn:hover { background: #f1efe8; }
  @media print {
    body { background: #fff; }
    .tabs, .export-btn { display: none; }
    .item { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Checklist ERP — Operaciones</h1>
    <p>Frituras Jesús · Revisión con Jefe de Operaciones · Abril 2026</p>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog" style="width:0%"></div></div>
    <p class="progress-label" id="prog-label">0 de 0 puntos revisados</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('todos', this)">Todos</div>
    <div class="tab" onclick="setTab('almacen', this)">Almacén</div>
    <div class="tab" onclick="setTab('produccion', this)">Producción</div>
    <div class="tab" onclick="setTab('logistica', this)">Logística</div>
    <div class="tab" onclick="setTab('general', this)">General / Integración</div>
  </div>

  <div id="checklist-body"></div>

  <div class="summary-box">
    <div class="summary-grid">
      <div class="summary-card"><div class="num" id="s-total">0</div><div class="lbl">Total ítems</div></div>
      <div class="summary-card"><div class="num" id="s-done" style="color:#1D9E75">0</div><div class="lbl">Revisados</div></div>
      <div class="summary-card"><div class="num" id="s-pend" style="color:#D85A30">0</div><div class="lbl">Pendientes</div></div>
    </div>
    <button class="export-btn" onclick="window.print()">Imprimir / Exportar PDF</button>
  </div>
</div>

<script>
const DATA = [
  {
    area: "almacen", titulo: "Almacén", colorClass: "s-almacen",
    items: [
      { id:"a1", text:"¿Cuántos almacenes/ubicaciones físicas existen? (materia prima, producto terminado, insumos)", tag:"datos" },
      { id:"a2", text:"¿Se gestiona inventario por lotes o fechas de caducidad (FEFO/FIFO)?", tag:"critico" },
      { id:"a3", text:"¿Actualmente se usa algún sistema para control de inventario? (Excel, ERP, WMS, otro)", tag:"proceso" },
      { id:"a4", text:"¿Cómo se realiza la recepción de materia prima? ¿Existe proceso de inspección/calidad en entrada?", tag:"proceso" },
      { id:"a5", text:"¿Se registran mermas, devoluciones o ajustes de inventario? ¿Cómo?", tag:"critico" },
      { id:"a6", text:"¿Se usan etiquetas, códigos de barras o RFID para identificación de productos?", tag:"integracion" },
      { id:"a7", text:"¿Cuántos SKUs o referencias maneja el almacén actualmente?", tag:"datos" },
      { id:"a8", text:"¿Existe separación entre almacén de materia prima (maíz, aceite, condimentos) y producto terminado?", tag:"proceso" },
      { id:"a9", text:"¿Cuál es la frecuencia de inventarios físicos o cíclicos?", tag:"proceso" },
      { id:"a10", text:"¿Cómo se maneja la trazabilidad de insumos hasta el producto final?", tag:"critico" },
    ]
  },
  {
    area: "produccion", titulo: "Producción", colorClass: "s-produccion",
    items: [
      { id:"p1", text:"¿Cuántas líneas de producción existen y qué tipo de producto procesa cada una?", tag:"datos" },
      { id:"p2", text:"¿Se manejan órdenes de producción formales o se trabaja por demanda/programa semanal?", tag:"proceso" },
      { id:"p3", text:"¿Existe un BOM (lista de materiales/receta) documentado por producto?", tag:"critico" },
      { id:"p4", text:"¿Cómo se registra el consumo real de materia prima vs. lo planeado?", tag:"critico" },
      { id:"p5", text:"¿Se llevan indicadores de OEE, eficiencia o rendimiento por línea/turno?", tag:"datos" },
      { id:"p6", text:"¿Existen procesos de empaque manual y/o automatizado? ¿Cómo se contabilizan las unidades?", tag:"proceso" },
      { id:"p7", text:"¿Se registran paros de maquinaria, causas y tiempos? ¿Se integra con mantenimiento?", tag:"integracion" },
      { id:"p8", text:"¿Cómo se planifica la producción actualmente? ¿Se usa MRP, forecast de ventas u otro método?", tag:"critico" },
      { id:"p9", text:"¿Existen lotes de producción trazables para normas de inocuidad (HACCP, BPM)?", tag:"critico" },
      { id:"p10", text:"¿Cómo se coordinan los supervisores de producción con el área de calidad e inocuidad?", tag:"proceso" },
      { id:"p11", text:"¿Cuántos turnos de trabajo existen y cómo se captura la producción por turno?", tag:"datos" },
      { id:"p12", text:"¿Qué tipo de maquinaria se utiliza? ¿Requiere integración con sensores IoT o sistemas SCADA?", tag:"integracion" },
    ]
  },
  {
    area: "logistica", titulo: "Logística", colorClass: "s-logistica",
    items: [
      { id:"l1", text:"¿Cómo se gestiona el despacho de pedidos? ¿Existe un proceso de picking y packing documentado?", tag:"proceso" },
      { id:"l2", text:"¿Se tiene flota propia, tercerizada o mixta para distribución?", tag:"datos" },
      { id:"l3", text:"¿Cómo se asignan rutas a los vendedores de ruta? ¿Se usa algún sistema de ruteo?", tag:"integracion" },
      { id:"l4", text:"¿Se registran las entregas y se genera evidencia (firma, foto, remisión)?", tag:"proceso" },
      { id:"l5", text:"¿Cómo se manejan las devoluciones de clientes? ¿Se reintegran al inventario?", tag:"critico" },
      { id:"l6", text:"¿Se controla la temperatura/condiciones durante el transporte de producto terminado?", tag:"critico" },
      { id:"l7", text:"¿Cuántos clientes/puntos de entrega se atienden por día/semana?", tag:"datos" },
      { id:"l8", text:"¿Cómo se comunica el estatus de entrega al área comercial y de servicio al cliente?", tag:"integracion" },
      { id:"l9", text:"¿Existe proceso formal de carga y verificación de vehículos antes de salida?", tag:"proceso" },
      { id:"l10", text:"¿Se maneja cross-docking o consolidación de pedidos entre rutas?", tag:"proceso" },
    ]
  },
  {
    area: "general", titulo: "General / Integración", colorClass: "s-general",
    items: [
      { id:"g1", text:"¿Cuántos usuarios operarían el ERP en el área de operaciones (almacén + producción + logística)?", tag:"usuario" },
      { id:"g2", text:"¿Qué sistemas o herramientas actuales deben integrarse con el ERP? (báscula, impresoras, WMS, TMS)", tag:"integracion" },
      { id:"g3", text:"¿Cuáles son los reportes operativos que se necesitan diariamente? ¿Quién los consume?", tag:"usuario" },
      { id:"g4", text:"¿Existen requerimientos regulatorios o de inocuidad que el ERP deba soportar? (COFEPRIS, FSMA)", tag:"critico" },
      { id:"g5", text:"¿Se tiene planeado crecer en líneas de producto o volumen en los próximos 2 años?", tag:"datos" },
      { id:"g6", text:"¿Cuál es la disponibilidad de conectividad en planta/almacén? (WiFi, red cableada, cobertura)", tag:"integracion" },
      { id:"g7", text:"¿Existe un área de TI interna o se trabaja con proveedor externo de soporte?", tag:"usuario" },
      { id:"g8", text:"¿Cuáles son los principales puntos de dolor actuales en operaciones que se espera resolver con el ERP?", tag:"critico" },
    ]
  }
];

const TAGS = { critico:"Crítico", datos:"Datos", proceso:"Proceso", integracion:"Integración", usuario:"Usuarios" };
let state = {};
let notes = {};
let currentTab = "todos";

DATA.forEach(s => s.items.forEach(i => { state[i.id] = false; notes[i.id] = ""; }));

function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll(".tab").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  render();
}

function toggle(id) {
  state[id] = !state[id];
  render();
}

function toggleNote(id, e) {
  e.stopPropagation();
  const el = document.getElementById("note-" + id);
  el.classList.toggle("open");
}

function saveNote(id, val) {
  notes[id] = val;
}

function render() {
  const body = document.getElementById("checklist-body");
  let html = "";
  const sections = currentTab === "todos" ? DATA : DATA.filter(s => s.area === currentTab);
  sections.forEach(sec => {
    html += `<div class="section"><div class="section-title ${sec.colorClass}">${sec.titulo}</div>`;
    sec.items.forEach(item => {
      const done = state[item.id];
      html += `<div class="item${done?" checked":""}" onclick="toggle('${item.id}')">
        <div class="checkbox${done?" done":""}">
          <svg class="check-svg" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div style="flex:1">
          <div class="meta-row">
            <span class="item-text">${item.text}</span>
            <span class="item-tag tag-${item.tag}">${TAGS[item.tag]}</span>
          </div>
          <div class="note-box">
            <span class="note-toggle" onclick="toggleNote('${item.id}', event)">+ agregar nota</span>
            <textarea id="note-${item.id}" class="note-input${notes[item.id]?" open":""}" placeholder="Notas del relevamiento..." onclick="event.stopPropagation()" oninput="saveNote('${item.id}', this.value)" rows="2">${notes[item.id]}</textarea>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  body.innerHTML = html;
  updateProgress();
}

function updateProgress() {
  const total = Object.keys(state).length;
  const done = Object.values(state).filter(Boolean).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("prog-label").textContent = `${done} de ${total} puntos revisados (${pct}%)`;
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-done").textContent = done;
  document.getElementById("s-pend").textContent = total - done;
}

render();
</script>
</body>
</html>
