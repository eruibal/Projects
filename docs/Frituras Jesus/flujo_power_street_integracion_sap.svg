<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="950" viewBox="0 0 680 950" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Flujo Power Street con puntos propuestos de integración con SAP</title>
  <desc>Flujo vertical de diez pasos de Power Street, desde la captura de producción diaria hasta la entrega del efectivo a Finanzas, con tres destinos de integración propuestos en SAP: Inventario, Ventas y CxC, y Caja y contabilidad. Las líneas punteadas indican los puntos donde la información debería reflejarse automáticamente en SAP.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
      .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
      .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
      rect.c-teal, .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal > .th { fill: #085041; }
      .c-teal > .ts { fill: #0F6E56; }
      rect.c-amber, .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber > .th { fill: #633806; }
      .c-amber > .ts { fill: #854F0B; }
      rect.c-gray, .c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray > .th { fill: #444441; }
      .c-gray > .ts { fill: #5F5E5A; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="150" y="42" text-anchor="middle" dominant-baseline="central">Power Street</text>
  <text class="th" x="530" y="42" text-anchor="middle" dominant-baseline="central">SAP (propuesto)</text>

  <g class="c-teal">
    <rect x="20" y="60" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="80" text-anchor="middle" dominant-baseline="central">Captura de producción diaria</text>
    <text class="ts" x="150" y="100" text-anchor="middle" dominant-baseline="central">Alimenta el depósito central</text>
  </g>
  <line x1="150" y1="120" x2="150" y2="142" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="20" y="146" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="166" text-anchor="middle" dominant-baseline="central">Entrada de inventario</text>
    <text class="ts" x="150" y="186" text-anchor="middle" dominant-baseline="central">Carga manual en Power Street</text>
  </g>
  <line x1="150" y1="206" x2="150" y2="228" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="20" y="232" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="252" text-anchor="middle" dominant-baseline="central">Conciliación física diaria</text>
    <text class="ts" x="150" y="272" text-anchor="middle" dominant-baseline="central">Físico vs. sistema</text>
  </g>
  <line x1="150" y1="292" x2="150" y2="314" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="20" y="318" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="338" text-anchor="middle" dominant-baseline="central">Autoventa — carga al vendedor</text>
    <text class="ts" x="150" y="358" text-anchor="middle" dominant-baseline="central">Asignación al vehículo</text>
  </g>
  <line x1="150" y1="378" x2="150" y2="400" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="20" y="404" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="424" text-anchor="middle" dominant-baseline="central">Ventas en ruta (app móvil)</text>
    <text class="ts" x="150" y="444" text-anchor="middle" dominant-baseline="central">Contado + crédito + cobranza</text>
  </g>
  <line x1="150" y1="464" x2="150" y2="486" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="20" y="490" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="510" text-anchor="middle" dominant-baseline="central">Descarga y arqueo físico</text>
    <text class="ts" x="150" y="530" text-anchor="middle" dominant-baseline="central">Apto y devoluciones</text>
  </g>
  <line x1="150" y1="550" x2="150" y2="572" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="20" y="576" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="596" text-anchor="middle" dominant-baseline="central">Ajustes de inventario packing</text>
    <text class="ts" x="150" y="616" text-anchor="middle" dominant-baseline="central">Sistema vs. conteo físico</text>
  </g>
  <line x1="150" y1="636" x2="150" y2="658" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="20" y="662" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="682" text-anchor="middle" dominant-baseline="central">Revisión de liquidación</text>
    <text class="ts" x="150" y="702" text-anchor="middle" dominant-baseline="central">Notas firmadas, venta neta</text>
  </g>
  <line x1="150" y1="722" x2="150" y2="744" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="20" y="748" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="768" text-anchor="middle" dominant-baseline="central">Conciliación del efectivo</text>
    <text class="ts" x="150" y="788" text-anchor="middle" dominant-baseline="central">Genera documento si hay faltante</text>
  </g>
  <line x1="150" y1="808" x2="150" y2="830" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="20" y="834" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="854" text-anchor="middle" dominant-baseline="central">Cierre y entrega a Finanzas</text>
    <text class="ts" x="150" y="874" text-anchor="middle" dominant-baseline="central">Hoja archivada, efectivo entregado</text>
  </g>

  <g class="c-gray">
    <rect x="420" y="361" width="220" height="56" rx="8" stroke-width="0.5" stroke-dasharray="5,4"/>
    <text class="th" x="530" y="381" text-anchor="middle" dominant-baseline="central">Inventario</text>
    <text class="ts" x="530" y="401" text-anchor="middle" dominant-baseline="central">Entradas, traspasos y ajustes</text>
  </g>

  <g class="c-gray">
    <rect x="420" y="662" width="220" height="56" rx="8" stroke-width="0.5" stroke-dasharray="5,4"/>
    <text class="th" x="530" y="682" text-anchor="middle" dominant-baseline="central">Ventas y CxC</text>
    <text class="ts" x="530" y="702" text-anchor="middle" dominant-baseline="central">Facturación y clientes</text>
  </g>

  <g class="c-gray">
    <rect x="420" y="834" width="220" height="56" rx="8" stroke-width="0.5" stroke-dasharray="5,4"/>
    <text class="th" x="530" y="854" text-anchor="middle" dominant-baseline="central">Caja y contabilidad</text>
    <text class="ts" x="530" y="874" text-anchor="middle" dominant-baseline="central">Efectivo y asientos</text>
  </g>

  <line x1="284" y1="174" x2="416" y2="389" stroke="#888780" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>
  <line x1="284" y1="346" x2="416" y2="389" stroke="#888780" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>
  <line x1="284" y1="604" x2="416" y2="389" stroke="#888780" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>
  <line x1="284" y1="690" x2="416" y2="690" stroke="#888780" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>
  <line x1="284" y1="862" x2="416" y2="862" stroke="#888780" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow)"/>

  <rect class="c-teal" x="40" y="914" width="14" height="14" rx="3" stroke-width="0.5"/>
  <text class="ts" x="62" y="921" dominant-baseline="central">Operación de inventario</text>
  <rect class="c-amber" x="240" y="914" width="14" height="14" rx="3" stroke-width="0.5"/>
  <text class="ts" x="262" y="921" dominant-baseline="central">Liquidación y cierre</text>
  <rect class="c-gray" x="440" y="914" width="14" height="14" rx="3" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text class="ts" x="462" y="921" dominant-baseline="central">Integración con SAP</text>
</svg>
