<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist Compras — Frituras Jesús</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
  .wrap { max-width: 820px; margin: 0 auto; }
  .header { margin-bottom: 1.75rem; }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #666; }
  .progress-bar-track { height: 6px; background: #e5e5e0; border-radius: 99px; margin: 14px 0 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: #888; text-align: right; }
  .section { margin-bottom: 1.1rem; border: 0.5px solid #d8d8d0; border-radius: 12px; overflow: hidden; background: #fff; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f5f5f0; cursor: pointer; user-select: none; }
  .section-icon { font-size: 15px; width: 22px; text-align: center; }
  .section-title { font-size: 14px; font-weight: 500; flex: 1; }
  .section-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #fff; border: 0.5px solid #ccc; color: #666; }
  .section-badge.done { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
  .toggle-arrow { font-size: 11px; color: #aaa; transition: transform 0.2s; }
  .toggle-arrow.open { transform: rotate(90deg); }
  .items { border-top: 0.5px solid #e8e8e0; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; border-bottom: 0.5px solid #eeeee8; cursor: pointer; transition: background 0.15s; }
  .item:last-child { border-bottom: none; }
  .item:hover { background: #f9f9f6; }
  .checkbox { width: 16px; height: 16px; border: 0.5px solid #bbb; border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checkbox.checked { background: #1D9E75; border-color: #1D9E75; }
  .checkmark { width: 9px; height: 6px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translateY(-1px); display: none; }
  .checkbox.checked .checkmark { display: block; }
  .item-text { font-size: 13px; line-height: 1.5; }
  .item-text.checked { color: #aaa; text-decoration: line-through; }
  .item-note { font-size: 11px; color: #999; margin-top: 2px; }
  .collapsed { display: none; }
  .actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #333; cursor: pointer; }
  .btn:hover { background: #f0f0ec; }
  .btn-primary { background: #1D9E75; color: white; border-color: #1D9E75; }
  .btn-primary:hover { background: #0F6E56; }
  @media print {
    body { background: white; padding: 1rem; }
    .actions { display: none; }
    .section { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Checklist — Proceso de compras</h1>
    <p>Ejecutivo de compras · Frituras Jesús · Levantamiento para RFP ERP</p>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="bar" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 de 0 ítems completados</div>
  </div>

  <div id="checklist"></div>

  <div class="actions">
    <button class="btn" onclick="expandAll()">Expandir todo</button>
    <button class="btn" onclick="collapseAll()">Colapsar todo</button>
    <button class="btn" onclick="clearAll()">Limpiar selección</button>
    <button class="btn" onclick="window.print()">Imprimir / Guardar PDF</button>
  </div>
</div>

<script>
const sections = [
  {
    icon: "🏭",
    title: "1. Catálogo de materiales y proveedores",
    items: [
      { text: "¿Qué categorías de materiales se compran?", note: "Materia prima (maíz, nixtamal), empaque, aceites, insumos de mantenimiento, limpieza, uniformes, combustible" },
      { text: "¿Cuántos proveedores activos tiene actualmente?" },
      { text: "¿Existe un catálogo formal de proveedores o se maneja de forma informal?" },
      { text: "¿Hay proveedores únicos (sole source) para materiales críticos como el maíz?", note: "Riesgo de cadena de suministro" },
      { text: "¿Cómo se da de alta un proveedor nuevo? ¿Qué documentos se solicitan?" },
      { text: "¿Se realizan evaluaciones periódicas de proveedores (calidad, precio, cumplimiento)?" },
      { text: "¿Existen contratos marco o acuerdos de precio con proveedores clave?" },
    ]
  },
  {
    icon: "📋",
    title: "2. Solicitud y autorización de compra",
    items: [
      { text: "¿Quién puede solicitar una compra y a través de qué mecanismo?", note: "Correo, formato impreso, verbal, sistema..." },
      { text: "¿Existe un flujo formal de aprobación (niveles de autorización por monto)?", note: "Ej. < $5,000 aprueba gerente administrativo; > $5,000 requiere director" },
      { text: "¿Qué sucede con compras urgentes o no planeadas? ¿Hay un proceso de emergencia?" },
      { text: "¿Se utilizan requisiciones de compra por escrito o el proceso es verbal/informal?" },
      { text: "¿Cuánto tiempo tarda en promedio una solicitud en convertirse en orden de compra?" },
      { text: "¿Quién valida que el gasto esté dentro del presupuesto antes de autorizar?" },
    ]
  },
  {
    icon: "📄",
    title: "3. Órdenes de compra (OC)",
    items: [
      { text: "¿Se generan órdenes de compra formales para todos los proveedores?" },
      { text: "¿En qué herramienta se elaboran actualmente las OC?", note: "Excel, Word, sistema contable, manual..." },
      { text: "¿Las OC se envían por correo, WhatsApp, o en papel?" },
      { text: "¿Existe un folio o número consecutivo para control de OC?" },
      { text: "¿Las OC incluyen: descripción, cantidad, precio unitario, condiciones de pago y fecha de entrega esperada?" },
      { text: "¿Cómo se manejan cambios o cancelaciones a una OC ya enviada?" },
      { text: "¿Se archivan las OC y por cuánto tiempo?" },
    ]
  },
  {
    icon: "🚚",
    title: "4. Recepción de mercancía",
    items: [
      { text: "¿Quién recibe físicamente la mercancía? ¿El ejecutivo de compras participa en la recepción?" },
      { text: "¿Se verifica la mercancía contra la OC al momento de recibirla?", note: "Cantidad, calidad, especificaciones" },
      { text: "¿Quién da el visto bueno de calidad en recepción? ¿Existe coordinación con el área de calidad e inocuidad?" },
      { text: "¿Qué pasa si la mercancía llega incompleta, dañada o fuera de especificación?" },
      { text: "¿Cómo se registra la entrada de mercancía al almacén actualmente?" },
      { text: "¿Se emite algún documento de recepción (contra-recibo) al proveedor?" },
    ]
  },
  {
    icon: "💰",
    title: "5. Gestión de pagos y facturas",
    items: [
      { text: "¿Cómo llegan las facturas de los proveedores? (correo, portal SAT, físico)" },
      { text: "¿Quién valida que la factura corresponde a una OC y a una recepción correcta (3-way match)?", note: "OC vs. factura vs. recepción" },
      { text: "¿Cuáles son los plazos de pago habituales?", note: "Contado, 8 días, 15 días, 30 días..." },
      { text: "¿Qué formas de pago se utilizan?", note: "Transferencia, cheque, efectivo, tarjeta" },
      { text: "¿El ejecutivo de compras coordina con tesorería y contabilidad para programar pagos?" },
      { text: "¿Existe una cuenta por pagar formal o se paga conforme se puede?" },
      { text: "¿Cómo se manejan notas de crédito o devoluciones de pago?" },
    ]
  },
  {
    icon: "📦",
    title: "6. Control de inventario y reabasto",
    items: [
      { text: "¿Existe un punto de reorden definido para materias primas críticas (maíz, aceite, empaque)?" },
      { text: "¿Quién genera la necesidad de compra: el ejecutivo de compras, el almacén, o producción?" },
      { text: "¿Qué tan frecuente se hace compra de materia prima?", note: "Diario, semanal, quincenal..." },
      { text: "¿Se maneja algún inventario de seguridad para evitar paros de producción?" },
      { text: "¿Cómo se controla el inventario actualmente?", note: "Sistema, kardex, Excel, visual..." },
      { text: "¿Se hacen conteos físicos de inventario? ¿Con qué frecuencia?" },
    ]
  },
  {
    icon: "⚖️",
    title: "7. Cumplimiento legal y normativo",
    items: [
      { text: "¿Todos los proveedores emiten CFDI correctamente vinculado a las compras?" },
      { text: "¿Se verifica que los proveedores no estén en listas negras del SAT (EFOS/EDOS)?" },
      { text: "¿Las compras de materia prima cumplen con los requisitos de inocuidad (proveedores certificados)?", note: "Relevante para calidad alimentaria" },
      { text: "¿Se conservan expedientes de proveedores con acta constitutiva, RFC, opinión de cumplimiento SAT?" },
      { text: "¿Existe alguna política de compras aprobada formalmente por la dirección?" },
    ]
  },
  {
    icon: "💻",
    title: "8. Requerimientos para el ERP",
    items: [
      { text: "¿Qué herramientas o sistemas utiliza actualmente para el proceso de compras?", note: "Excel, CONTPAQi, SAE, ninguno..." },
      { text: "¿Cuáles son los principales cuellos de botella o problemas que enfrenta hoy?" },
      { text: "¿Qué reportes o indicadores necesita tener disponibles en el ERP?", note: "Costo por categoría, rotación de proveedores, antigüedad de OC abiertas..." },
      { text: "¿Qué integraciones necesita el módulo de compras?", note: "Contabilidad, almacén, producción, tesorería" },
      { text: "¿Cuántos usuarios utilizarán el módulo de compras del ERP?" },
      { text: "¿Existen procesos de compra que deben quedar fuera del ERP?", note: "Ej. gastos de caja chica, compras de emergencia en efectivo" },
      { text: "¿Se requiere aprobación electrónica de OC dentro del sistema?" },
    ]
  }
];

let state = {};

function buildChecklist() {
  const container = document.getElementById('checklist');
  sections.forEach((sec, si) => {
    const section = document.createElement('div');
    section.className = 'section';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="section-icon">${sec.icon}</span>
      <span class="section-title">${sec.title}</span>
      <span class="section-badge" id="badge-${si}">0/${sec.items.length}</span>
      <span class="toggle-arrow open" id="arrow-${si}">▶</span>
    `;
    header.addEventListener('click', () => toggleSection(si));

    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'items';
    itemsDiv.id = `items-${si}`;

    sec.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      state[key] = false;
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div class="checkbox" id="cb-${key}"><div class="checkmark"></div></div>
        <div>
          <div class="item-text" id="it-${key}">${item.text}</div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        </div>
      `;
      div.addEventListener('click', () => toggle(key, si));
      itemsDiv.appendChild(div);
    });

    section.appendChild(header);
    section.appendChild(itemsDiv);
    container.appendChild(section);
  });
  updateProgress();
}

function toggle(key, si) {
  state[key] = !state[key];
  const cb = document.getElementById(`cb-${key}`);
  const it = document.getElementById(`it-${key}`);
  if (state[key]) { cb.classList.add('checked'); it.classList.add('checked'); }
  else { cb.classList.remove('checked'); it.classList.remove('checked'); }
  updateBadge(si);
  updateProgress();
}

function updateBadge(si) {
  const done = sections[si].items.filter((_, ii) => state[`${si}-${ii}`]).length;
  const total = sections[si].items.length;
  const badge = document.getElementById(`badge-${si}`);
  badge.textContent = `${done}/${total}`;
  if (done === total && total > 0) badge.classList.add('done');
  else badge.classList.remove('done');
}

function updateProgress() {
  const total = Object.keys(state).length;
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById('bar').style.width = (done / total * 100) + '%';
  document.getElementById('prog-label').textContent = `${done} de ${total} ítems completados`;
}

function toggleSection(si) {
  document.getElementById(`items-${si}`).classList.toggle('collapsed');
  document.getElementById(`arrow-${si}`).classList.toggle('open');
}

function expandAll() {
  sections.forEach((_, si) => {
    document.getElementById(`items-${si}`).classList.remove('collapsed');
    document.getElementById(`arrow-${si}`).classList.add('open');
  });
}

function collapseAll() {
  sections.forEach((_, si) => {
    document.getElementById(`items-${si}`).classList.add('collapsed');
    document.getElementById(`arrow-${si}`).classList.remove('open');
  });
}

function clearAll() {
  Object.keys(state).forEach(key => {
    state[key] = false;
    document.getElementById(`cb-${key}`).classList.remove('checked');
    const it = document.getElementById(`it-${key}`);
    if (it) it.classList.remove('checked');
  });
  sections.forEach((_, si) => updateBadge(si));
  updateProgress();
}

buildChecklist();
</script>
</body>
</html>
