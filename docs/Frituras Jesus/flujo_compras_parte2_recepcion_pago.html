<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flujo de compras — Parte 2: Recepción y pago · Frituras Jesús</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  p { font-size: 12px; color: #666; margin-bottom: 1.5rem; }
  svg { width: 100%; height: auto; display: block; }

  .node { cursor: pointer; }
  .node:hover rect, .node:hover polygon { opacity: 0.85; }

  .c-gray rect, .c-gray polygon, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-purple rect, .c-purple polygon              { fill: #EEEDFE; stroke: #534AB7; }
  .c-coral rect, .c-coral polygon                { fill: #FAECE7; stroke: #993C1D; }
  .c-amber rect, .c-amber polygon                { fill: #FAEEDA; stroke: #854F0B; }
  .c-teal rect, .c-teal polygon                  { fill: #E1F5EE; stroke: #0F6E56; }

  .c-gray   text { fill: #444441; }
  .c-purple text { fill: #3C3489; }
  .c-coral  text { fill: #712B13; }
  .c-amber  text { fill: #633806; }
  .c-teal   text { fill: #085041; }

  .th { font-weight: 600; font-size: 14px; }
  .ts { font-size: 12px; }

  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1.25rem; font-size: 12px; color: #555; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; border: 0.5px solid; }
  .sw-purple { background: #EEEDFE; border-color: #534AB7; }
  .sw-coral  { background: #FAECE7; border-color: #993C1D; }
  .sw-amber  { background: #FAEEDA; border-color: #854F0B; }
  .sw-teal   { background: #E1F5EE; border-color: #0F6E56; }
  .sw-gray   { background: #F1EFE8; border-color: #5F5E5A; }

  @media print { body { background: white; padding: 1rem; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Proceso de compras — Parte 2: Recepción y pago</h1>
  <p>Frituras Jesús · Levantamiento para RFP ERP · Abril 2026</p>

  <svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Inicio / continuación -->
    <g class="c-gray">
      <rect x="190" y="20" width="260" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="320" y="34" text-anchor="middle" dominant-baseline="central">← Desde: envío de OC</text>
    </g>
    <line x1="320" y1="48" x2="320" y2="78" class="arr" marker-end="url(#arrow)"/>

    <!-- Recepción en almacén -->
    <g class="c-purple node">
      <rect x="200" y="79" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="98" text-anchor="middle" dominant-baseline="central">Recepción en almacén</text>
      <text class="ts" x="320" y="116" text-anchor="middle" dominant-baseline="central">OC + factura + cert. de lote</text>
    </g>
    <line x1="320" y1="135" x2="320" y2="163" class="arr" marker-end="url(#arrow)"/>

    <!-- Decisión: ¿hay diferencias? -->
    <g class="c-coral">
      <polygon points="230,199 320,164 410,199 320,234" stroke-width="0.5"/>
      <text class="ts" x="320" y="199" text-anchor="middle" dominant-baseline="central">¿Hay diferencias?</text>
    </g>
    <text class="ts" x="416" y="193" text-anchor="start" fill="#555">Sí</text>
    <line x1="410" y1="199" x2="451" y2="199" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="312" y="243" text-anchor="end" fill="#555">No</text>
    <line x1="320" y1="234" x2="320" y2="264" class="arr" marker-end="url(#arrow)"/>

    <!-- Acuerdo con proveedor -->
    <g class="c-amber node">
      <rect x="452" y="181" width="175" height="36" rx="8" stroke-width="0.5"/>
      <text class="ts" x="539" y="199" text-anchor="middle" dominant-baseline="central">Acuerdo con proveedor</text>
    </g>
    <path d="M539,217 L539,252 L320,252 L320,264" fill="none" class="arr" marker-end="url(#arrow)"/>

    <!-- Registro de entrada -->
    <g class="c-gray node">
      <rect x="200" y="265" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="284" text-anchor="middle" dominant-baseline="central">Registro de entrada</text>
      <text class="ts" x="320" y="302" text-anchor="middle" dominant-baseline="central">Excel de entradas/salidas</text>
    </g>
    <line x1="320" y1="321" x2="320" y2="351" class="arr" marker-end="url(#arrow)"/>

    <!-- 3-way match -->
    <g class="c-teal node">
      <rect x="200" y="352" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="371" text-anchor="middle" dominant-baseline="central">Verificación 3-way match</text>
      <text class="ts" x="320" y="389" text-anchor="middle" dominant-baseline="central">OC / factura / recepción</text>
    </g>
    <line x1="320" y1="408" x2="320" y2="438" class="arr" marker-end="url(#arrow)"/>

    <!-- Registro CxP -->
    <g class="c-gray node">
      <rect x="200" y="439" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="458" text-anchor="middle" dominant-baseline="central">Registro de CxP</text>
      <text class="ts" x="320" y="476" text-anchor="middle" dominant-baseline="central">Plazo 7, 15 o 30 días</text>
    </g>
    <line x1="320" y1="495" x2="320" y2="525" class="arr" marker-end="url(#arrow)"/>

    <!-- Pago al proveedor -->
    <g class="c-teal node">
      <rect x="200" y="526" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="545" text-anchor="middle" dominant-baseline="central">Pago al proveedor</text>
      <text class="ts" x="320" y="563" text-anchor="middle" dominant-baseline="central">Transferencia electrónica</text>
    </g>
    <line x1="320" y1="582" x2="320" y2="610" class="arr" marker-end="url(#arrow)"/>

    <!-- Fin -->
    <g class="c-gray">
      <rect x="245" y="611" width="150" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="320" y="625" text-anchor="middle" dominant-baseline="central">Fin del proceso</text>
    </g>
  </svg>

  <div class="legend">
    <div class="legend-item"><div class="swatch sw-purple"></div> Flujo principal</div>
    <div class="legend-item"><div class="swatch sw-coral"></div> Decisión</div>
    <div class="legend-item"><div class="swatch sw-amber"></div> Ruta alternativa / excepción</div>
    <div class="legend-item"><div class="swatch sw-teal"></div> Validación clave</div>
    <div class="legend-item"><div class="swatch sw-gray"></div> Inicio / fin / soporte administrativo</div>
  </div>
</div>
</body>
</html>
