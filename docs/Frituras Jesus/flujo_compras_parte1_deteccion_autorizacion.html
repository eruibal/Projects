<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flujo de compras — Parte 1: Detección y autorización · Frituras Jesús</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  p { font-size: 12px; color: #666; margin-bottom: 1.5rem; }
  svg { width: 100%; height: auto; display: block; }

  /* Node hover */
  .node { cursor: pointer; }
  .node:hover rect, .node:hover polygon { opacity: 0.85; }

  /* Pre-built color classes */
  .c-gray rect, .c-gray polygon, .c-gray ellipse  { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-purple rect, .c-purple polygon               { fill: #EEEDFE; stroke: #534AB7; }
  .c-coral rect, .c-coral polygon                 { fill: #FAECE7; stroke: #993C1D; }
  .c-amber rect, .c-amber polygon                 { fill: #FAEEDA; stroke: #854F0B; }
  .c-teal rect, .c-teal polygon                   { fill: #E1F5EE; stroke: #0F6E56; }

  .c-gray  text { fill: #444441; }
  .c-purple text { fill: #3C3489; }
  .c-coral  text { fill: #712B13; }
  .c-amber  text { fill: #633806; }
  .c-teal   text { fill: #085041; }

  .th { font-weight: 600; font-size: 14px; }
  .ts { font-size: 12px; }

  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1.25rem; font-size: 12px; color: #555; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; border: 0.5px solid; }
  .sw-purple { background: #EEEDFE; border-color: #534AB7; }
  .sw-coral  { background: #FAECE7; border-color: #993C1D; }
  .sw-amber  { background: #FAEEDA; border-color: #854F0B; }
  .sw-gray   { background: #F1EFE8; border-color: #5F5E5A; }

  @media print { body { background: white; padding: 1rem; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Proceso de compras — Parte 1: Detección y autorización</h1>
  <p>Frituras Jesús · Levantamiento para RFP ERP · Abril 2026</p>

  <svg viewBox="0 0 680 870" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Inicio -->
    <g class="c-gray">
      <rect x="270" y="20" width="100" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="320" y="34" text-anchor="middle" dominant-baseline="central">Inicio</text>
    </g>
    <line x1="320" y1="48" x2="320" y2="67" class="arr" marker-end="url(#arrow)"/>

    <!-- Reporte de existencias -->
    <g class="c-purple node">
      <rect x="200" y="68" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="87" text-anchor="middle" dominant-baseline="central">Reporte de existencias</text>
      <text class="ts" x="320" y="105" text-anchor="middle" dominant-baseline="central">Almacén envía diariamente</text>
    </g>
    <line x1="320" y1="124" x2="320" y2="154" class="arr" marker-end="url(#arrow)"/>

    <!-- Decisión: ¿reabasto? -->
    <g class="c-coral">
      <polygon points="230,190 320,155 410,190 320,225" stroke-width="0.5"/>
      <text class="ts" x="320" y="190" text-anchor="middle" dominant-baseline="central">¿Reabasto necesario?</text>
    </g>
    <text class="ts" x="312" y="232" text-anchor="end" fill="#555">Sí</text>
    <line x1="320" y1="225" x2="320" y2="254" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="416" y="184" text-anchor="start" fill="#555">No</text>
    <line x1="410" y1="190" x2="460" y2="190" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="464" y="190" text-anchor="start" dominant-baseline="central" fill="#555">Fin del ciclo</text>

    <!-- Decisión: ¿urgente? -->
    <g class="c-coral">
      <polygon points="230,290 320,255 410,290 320,325" stroke-width="0.5"/>
      <text class="ts" x="320" y="290" text-anchor="middle" dominant-baseline="central">¿Compra urgente?</text>
    </g>
    <text class="ts" x="416" y="284" text-anchor="start" fill="#555">Sí</text>
    <line x1="410" y1="290" x2="451" y2="290" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="312" y="333" text-anchor="end" fill="#555">No</text>
    <line x1="320" y1="325" x2="320" y2="354" class="arr" marker-end="url(#arrow)"/>

    <!-- Tarjeta empresarial -->
    <g class="c-amber node">
      <rect x="452" y="262" width="175" height="56" rx="8" stroke-width="0.5"/>
      <text class="ts" x="539" y="281" text-anchor="middle" dominant-baseline="central">Tarjeta empresarial</text>
      <text class="ts" x="539" y="299" text-anchor="middle" dominant-baseline="central">Continúa en recepción</text>
    </g>

    <!-- Solicitud de compra -->
    <g class="c-purple node">
      <rect x="200" y="355" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="374" text-anchor="middle" dominant-baseline="central">Solicitud de compra</text>
      <text class="ts" x="320" y="392" text-anchor="middle" dominant-baseline="central">Por correo electrónico</text>
    </g>
    <line x1="320" y1="411" x2="320" y2="441" class="arr" marker-end="url(#arrow)"/>

    <!-- Crear OC -->
    <g class="c-purple node">
      <rect x="200" y="442" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="461" text-anchor="middle" dominant-baseline="central">Crear orden de compra</text>
      <text class="ts" x="320" y="479" text-anchor="middle" dominant-baseline="central">Formato foliado y preimpreso</text>
    </g>
    <line x1="320" y1="498" x2="320" y2="528" class="arr" marker-end="url(#arrow)"/>

    <!-- Autorización dirección -->
    <g class="c-purple node">
      <rect x="200" y="529" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="548" text-anchor="middle" dominant-baseline="central">Autorización por dirección</text>
      <text class="ts" x="320" y="566" text-anchor="middle" dominant-baseline="central">Aprox. 1 día hábil</text>
    </g>
    <line x1="320" y1="585" x2="320" y2="615" class="arr" marker-end="url(#arrow)"/>

    <!-- Envío OC proveedor -->
    <g class="c-purple node">
      <rect x="200" y="616" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="320" y="635" text-anchor="middle" dominant-baseline="central">Envío OC al proveedor</text>
      <text class="ts" x="320" y="653" text-anchor="middle" dominant-baseline="central">Por WhatsApp</text>
    </g>
    <line x1="320" y1="672" x2="320" y2="702" class="arr" marker-end="url(#arrow)"/>

    <!-- Decisión: ¿cambios? -->
    <g class="c-coral">
      <polygon points="230,738 320,703 410,738 320,773" stroke-width="0.5"/>
      <text class="ts" x="320" y="738" text-anchor="middle" dominant-baseline="central">¿Requiere cambios?</text>
    </g>
    <text class="ts" x="416" y="731" text-anchor="start" fill="#555">Sí</text>
    <line x1="410" y1="738" x2="451" y2="738" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="312" y="781" text-anchor="end" fill="#555">No</text>
    <line x1="320" y1="773" x2="320" y2="800" class="arr" marker-end="url(#arrow)"/>

    <!-- Nueva OC / cancela anterior -->
    <g class="c-amber node">
      <rect x="452" y="710" width="175" height="56" rx="8" stroke-width="0.5"/>
      <text class="ts" x="539" y="729" text-anchor="middle" dominant-baseline="central">Nueva OC</text>
      <text class="ts" x="539" y="747" text-anchor="middle" dominant-baseline="central">Cancela la anterior</text>
    </g>
    <path d="M627,738 L638,738 L638,644 L440,644" fill="none" class="arr" marker-end="url(#arrow)"/>

    <!-- Fin / continúa -->
    <g class="c-gray">
      <rect x="190" y="801" width="260" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="320" y="815" text-anchor="middle" dominant-baseline="central">Continúa → recepción</text>
    </g>
  </svg>

  <div class="legend">
    <div class="legend-item"><div class="swatch sw-purple"></div> Flujo principal</div>
    <div class="legend-item"><div class="swatch sw-coral"></div> Decisión</div>
    <div class="legend-item"><div class="swatch sw-amber"></div> Ruta alternativa / excepción</div>
    <div class="legend-item"><div class="swatch sw-gray"></div> Inicio / fin</div>
  </div>
</div>
</body>
</html>
